version: "3.9"

services:
  api:
    build: .
    container_name: cloudsentinel-api
    ports:
      - "8000:8000"
    environment:
      - AWS_DEFAULT_REGION=eu-north-1
      - FINDINGS_TABLE=cloudsentinel-findings-local
      - LOG_LEVEL=INFO
    volumes:
      - ~/.aws:/home/cloudsentinel/.aws:ro
    depends_on:
      - dynamodb-local
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: cloudsentinel-dynamodb
    ports:
      - "8001:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  dynamodb-setup:
    image: amazon/aws-cli:latest
    container_name: cloudsentinel-db-setup
    depends_on:
      - dynamodb-local
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=eu-north-1
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      aws dynamodb create-table
        --table-name cloudsentinel-findings-local
        --attribute-definitions
          AttributeName=finding_id,AttributeType=S
          AttributeName=cloud,AttributeType=S
          AttributeName=status,AttributeType=S
        --key-schema AttributeName=finding_id,KeyType=HASH
        --billing-mode PAY_PER_REQUEST
        --global-secondary-indexes '[
          {\"IndexName\":\"cloud-status-index\",
           \"KeySchema\":[
             {\"AttributeName\":\"cloud\",\"KeyType\":\"HASH\"},
             {\"AttributeName\":\"status\",\"KeyType\":\"RANGE\"}
           ],
           \"Projection\":{\"ProjectionType\":\"ALL\"}}
        ]'
        --endpoint-url http://dynamodb-local:8000
        --region eu-north-1
      "