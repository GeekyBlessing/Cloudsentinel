name: CloudSentinel CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --tb=short \
            --cov=cloudsentinel \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install linting tools
        run: |
          pip install ruff mypy boto3-stubs pydantic

      - name: Run Ruff linter
        run: ruff check cloudsentinel/

      - name: Run Ruff formatter check
        run: ruff format --check cloudsentinel/

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit SAST scan
        run: |
          bandit -r cloudsentinel/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            -x cloudsentinel/storage/dynamodb.py \
            || true

      - name: Run pip-audit dependency scan
        run: pip-audit -r requirements.txt --format=json

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t cloudsentinel:${{ github.sha }} .
          docker build -t cloudsentinel:latest .

      - name: Run container smoke test
        run: |
          docker run --rm \
            -e AWS_DEFAULT_REGION=eu-north-1 \
            -e FINDINGS_TABLE=test-table \
            cloudsentinel:latest \
            python -c "from cloudsentinel.main import app; print('Container OK')"